    async function bookingPost(path, body) {
      const res = await fetch(`${BOOKING_API}${path}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      if (!res.ok) { const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` })); throw new Error(err.error || `Request failed: ${res.status}`); }
      return res.json();
    }
    async function bookingGet(path, params = {}) {
      const q = new URLSearchParams(params).toString();
      const res = await fetch(`${BOOKING_API}${path}${q ? "?" + q : ""}`);
      if (!res.ok) { const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` })); throw new Error(err.error || `Request failed: ${res.status}`); }
      return res.json();
    }

    function Bk({ onClick }) { return <div className="nav-r"><button className="bk-btn" onClick={onClick}>{"\u2190"}</button></div>; }
    function Ht({ text }) { return <div className="ht"><div className="has">{CONFIG.avatarUrl ? <img src={CONFIG.avatarUrl} alt="" /> : "\u{1F469}"}</div><div className="htx">{text}</div></div>; }
    function Ii({ tooltip }) { return <span className="tw"><span className="ii">?</span><span className="tp">{tooltip}</span></span>; }

    // ============================================================
    // WIZARD STEPS
    // ============================================================
    function S1({ data, onChange, onNext }) {
      const fmt = (v) => { const d = v.replace(/\D/g, "").slice(0, 10); if (d.length <= 3) return d; if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`; return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`; };
      const nOk = data.fullName?.trim().length > 0;
      const pOk = (data.phone || "").replace(/\D/g, "").length === 10;
      return (<div className="sc" key="s1"><Av /><h1 className="st">I'll get you some great options in a minute. Ready to go?</h1>
        <div className="ir"><input className="inf" placeholder="Full Name*" value={data.fullName || ""} onChange={(e) => onChange({ ...data, fullName: e.target.value })} onKeyDown={(e) => e.key === "Enter" && nOk && pOk && onNext()} /><input className="inf" placeholder="Phone Number*" value={data.phone || ""} onChange={(e) => onChange({ ...data, phone: fmt(e.target.value) })} onKeyDown={(e) => e.key === "Enter" && nOk && pOk && onNext()} /></div>
        <button className="bp" disabled={!nOk || !pOk} onClick={onNext}>Next</button><div style={{ flex: 1 }} /><Ht text="We ask for your phone number so our technicians can contact you if we see any issues with setting up your new system." /></div>);
    }

    // Mini Google Map component
    function MiniMap({ address }) {
      const mapRef = React.useRef(null);
      const mapInstance = React.useRef(null);
      const markerInstance = React.useRef(null);

      useEffect(() => {
        if (!mapRef.current || !window.google?.maps || !address) return;
        const geocoder = new window.google.maps.Geocoder();
        geocoder.geocode({ address }, (results, status) => {
          if (status === "OK" && results[0]) {
            const loc = results[0].geometry.location;
            if (!mapInstance.current) {
              mapInstance.current = new window.google.maps.Map(mapRef.current, {
                center: loc, zoom: 16, disableDefaultUI: true, zoomControl: true,
                styles: [
                  { featureType: "poi", stylers: [{ visibility: "off" }] },
                  { featureType: "transit", stylers: [{ visibility: "off" }] },
                ],
              });
              markerInstance.current = new window.google.maps.Marker({
                position: loc, map: mapInstance.current,
                icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: "#F28C28", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 3 },
              });
            } else {
              mapInstance.current.setCenter(loc);
              markerInstance.current.setPosition(loc);
            }
          }
        });
      }, [address]);

      return <div ref={mapRef} style={{ width: "100%", maxWidth: 520, height: 180, borderRadius: 12, overflow: "hidden", background: "#e8f4e8" }} />;
    }

    function S2({ data, onChange, onNext }) {
      const [suggestions, setSuggestions] = useState([]);
      const [showSug, setShowSug] = useState(false);
      const [placesReady, setPlacesReady] = useState(false);
      const serviceRef = React.useRef(null);
      const fn = (data.fullName || "").split(" ")[0] || "there";

      // Try to load Google Places API dynamically
      useEffect(() => {
        if (window.google?.maps?.places) {
          try { serviceRef.current = new window.google.maps.places.AutocompleteService(); setPlacesReady(true); } catch(e) {}
          return;
        }
        const script = document.createElement("script");
        script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyA2bAqk6S5LGpJTDhWoQ8vZQ9h-uTLnT-w&libraries=places";
        script.async = true;
        script.onload = () => {
          try { serviceRef.current = new window.google.maps.places.AutocompleteService(); setPlacesReady(true); } catch(e) {}
        };
        script.onerror = () => {};
        document.head.appendChild(script);
      }, []);

      const handleType = (v) => {
        onChange({ ...data, address: v, addressConfirmed: false });
        if (serviceRef.current && v.length >= 3) {
          serviceRef.current.getPlacePredictions(
            { input: v, types: ["address"], componentRestrictions: { country: "us" } },
            (results) => { if (results) { setSuggestions(results.map(r => r.description)); setShowSug(true); } }
          );
        } else { setSuggestions([]); setShowSug(false); }
      };

      const selectSug = (addr) => { onChange({ ...data, address: addr, addressConfirmed: true }); setSuggestions([]); setShowSug(false); };
      const addrLen = (data.address || "").trim().length;

      return (<div className="sc" key="s2"><Av /><h1 className="st">Great to meet you {fn}! Where's your home located?</h1>
        {data.addressConfirmed && placesReady ? <MiniMap address={data.address} /> : data.addressConfirmed ? <div className="mp">{"\u{1F4CD}"}</div> : null}
        <div className="aw" style={{ marginTop: data.addressConfirmed ? 16 : 0 }}>
          <div className="ar">
            <input className="inf" style={{ flex: 1 }} placeholder="Street Address, City, State*" value={data.address || ""}
              onChange={(e) => handleType(e.target.value)}
              onFocus={() => suggestions.length > 0 && setShowSug(true)}
              onKeyDown={(e) => { if (e.key === "Enter" && addrLen >= 10) { onChange({ ...data, addressConfirmed: true }); setShowSug(false); } }}
            />
            <input className="inf sm" placeholder="Apt/Unit#" value={data.unit || ""} onChange={(e) => onChange({ ...data, unit: e.target.value })} />
          </div>
          {showSug && suggestions.length > 0 && (
            <div className="acd">{suggestions.map((s, i) =>
              <div key={i} className="aci" onMouseDown={() => selectSug(s)}>{s}</div>
            )}</div>
          )}
        </div>
        <div style={{ marginTop: 24, display: "flex", gap: 12, alignItems: "center" }}>
          {addrLen >= 10 && !data.addressConfirmed && <button className="bs" onClick={() => { onChange({ ...data, addressConfirmed: true }); setShowSug(false); }}>Confirm Address</button>}
          <button className="bp" disabled={!data.addressConfirmed} onClick={onNext}>Next</button>
        </div>
        {!placesReady && <Ht text="Type your full address including city and state, then click Confirm Address." />}
      </div>);
    }

    function S3({ data, onChange, onNext }) {
      return (<div className="sc" key="s3"><Av /><h1 className="st">What kind of system are you interested in today?</h1>
        <div className="opr">{SYSTEM_TYPES.map((o) => <div key={o.id} className={`oc ${data.systemType === o.id ? "sel" : ""}`} onClick={() => onChange({ ...data, systemType: o.id })}><div className="oi">{o.icon}</div><div className="ol">{o.label}</div><div className="orad" /></div>)}</div>
        <button className="bp" disabled={!data.systemType} onClick={onNext}>Next</button></div>);
    }

    function S4({ data, onChange, onNext }) {
      const opts = [{ id: "small_mid", label: "Small-Mid (0\u20131,400 sq.ft.)" }, { id: "medium", label: "Medium (1,400\u20131,800 sq.ft.)" }, { id: "mid_large", label: "Mid-Large (1,800\u20132,400 sq.ft.)" }, { id: "large", label: "Large (2,400+ sq.ft.)" }];
      return (<div className="sc" key="s4"><Av /><h1 className="st">Approx. Area Served By This System</h1>
        <div className="lo">{opts.map((o) => <div key={o.id} className={`li ${data.homeSize === o.id ? "sel" : ""}`} onClick={() => onChange({ ...data, homeSize: o.id })}><div className="orad" /><div className="lil">{o.label}</div></div>)}</div>
        <div className="br"><button className="bp" disabled={!data.homeSize} onClick={onNext}>Next</button><button className="bs" onClick={() => { onChange({ ...data, homeSize: "medium" }); onNext(); }}>I Don't Know</button></div></div>);
    }

    function S5({ data, onChange, onNext }) {
      const opts = [{ id: "basement", label: "Basement", icon: "\u{1FA9C}" }, { id: "crawlspace", label: "Crawlspace", icon: "\u{1F6AA}" }, { id: "garage", label: "Garage", icon: "\u{1F3E0}" }, { id: "attic", label: "Attic", icon: "\u{1F53A}" }, { id: "closet", label: "Closet", icon: "\u{1F6AA}" }, { id: "wall_mounted", label: "Wall Mounted", icon: "\u{1F4E6}" }, { id: "packaged_unit", label: "Packaged Unit", icon: "\u{1F3D8}\u{FE0F}" }];
      return (<div className="sc" key="s5"><Av /><h1 className="st">Where is your indoor unit located?</h1>
        <div className="opr">{opts.map((o) => <div key={o.id} className={`oc ${data.unitLocation === o.id ? "sel" : ""}`} onClick={() => onChange({ ...data, unitLocation: o.id })}><div className="oi">{o.icon}</div><div className="ol">{o.label}</div><div className="orad" /></div>)}</div>
        <div className="br"><button className="bp" disabled={!data.unitLocation} onClick={onNext}>Next</button><button className="bs" onClick={() => { onChange({ ...data, unitLocation: "unknown" }); onNext(); }}>I Don't Know</button></div></div>);
    }

    function S6({ data, onChange, onNext }) {
      const opts = [{ id: "natural_gas", label: "Natural Gas", icon: "\u{1F525}" }, { id: "dual_fuel", label: "Dual Fuel", icon: "\u{1F525}\u{2744}\u{FE0F}" }, { id: "electric", label: "Electric", icon: "\u{26A1}" }, { id: "heat_pump", label: "Heat Pump", icon: "\u{2668}\u{FE0F}" }];
      const [more, setMore] = useState(false);
      const vis = more ? opts : opts.slice(0, 2);
      return (<div className="sc" key="s6"><Av /><h1 className="st">What's your heating system's energy source?</h1>
        <div className="opr">
          {vis.map((o) => <div key={o.id} className={`oc ${data.energySource === o.id ? "sel" : ""}`} onClick={() => onChange({ ...data, energySource: o.id })}><div className="oi">{o.icon}</div><div className="ol">{o.label}</div><div className="orad" /></div>)}
          {!more && <div className="oc" onClick={() => setMore(true)}><div className="oi" style={{ background: "#ddd", color: "#888", fontSize: 28 }}>{"\u{203A}"}</div><div className="ol" style={{ color: CONFIG.accentColor, textDecoration: "underline" }}>More Options</div></div>}
        </div>
        <button className="bp" disabled={!data.energySource} onClick={onNext}>Next</button></div>);
    }

    function S7({ data, onChange, onNext }) {
      const sysL = {}; SYSTEM_TYPES.forEach(s => sysL[s.id] = s.label);
      const locL = { basement: "Basement", crawlspace: "Crawlspace", garage: "Garage", attic: "Attic", closet: "Closet", wall_mounted: "Wall Mounted", packaged_unit: "Packaged Unit", unknown: "Not Sure" };
      const eOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email || "");
      return (<div className="sc" key="s7"><Av /><h1 className="st">Does everything look right?</h1>
        <div className="rc"><div className="rg">
          <div><div className="ril">Type of System</div><div className="riv">{sysL[data.systemType] || "\u2014"}</div></div>
          <div><div className="ril">Size</div><div className="riv">{SIZE_LABELS[data.homeSize] || "\u2014"}</div></div>
          <div><div className="ril">Unit Location</div><div className="riv">{locL[data.unitLocation] || "\u2014"}</div></div>
        </div></div>
        <div className="ir"><input className="inf" style={{ maxWidth: 360 }} placeholder="Email Address*" type="email" value={data.email || ""} onChange={(e) => onChange({ ...data, email: e.target.value })} onKeyDown={(e) => e.key === "Enter" && eOk && onNext()} /></div>
        <button className="bp" disabled={!eOk} onClick={onNext}>Next</button></div>);
    }

    function S8({ onComplete }) {
      const [p, setP] = useState(0);
      const lbl = ["Size", "Efficiency", "Equipment", "Pricing"];
      useEffect(() => { const t = setInterval(() => setP((v) => { if (v >= 100) { clearInterval(t); return 100; } return v + 2; }), 60); const c = setTimeout(() => onComplete(), 3200); return () => { clearInterval(t); clearTimeout(c); }; }, [onComplete]);
      return (<div className="sc" key="s8"><Av /><h1 className="st">Analyzing your data, just a sec...</h1><div className="ls"><div className="ll">{lbl[Math.min(Math.floor(p / 25), 3)]}</div><div className="lbc"><div className="lb" style={{ width: `${p}%` }} /></div></div></div>);
    }

    // ============================================================
    // RESULTS
    // ============================================================
    function S9({ data, onSchedule }) {
      const cat = EQUIPMENT_CATALOG[data.systemType || "furnace_ac"]?.[data.homeSize || "large"] || EQUIPMENT_CATALOG.furnace_ac.large;
      const tiers = [{ key: "good", label: "Good", d: cat.good }, { key: "better", label: "Better", d: cat.better }, { key: "best", label: "Best", d: cat.best, hl: true }];
      return (<div className="sc" key="s9"><Av /><h1 className="st">Results</h1><div className="resg">{tiers.map((t) => <ResCard key={t.key} tier={t} onSchedule={() => onSchedule(t.key)} />)}</div></div>);
    }

    function ResCard({ tier, onSchedule }) {
      const [exp, setExp] = useState(false);
      const d = tier.d;
      const features = [d.scope && { l: "Scope of Work", v: d.scope }, d.warranty && { l: "Warranty", v: d.warranty }, d.sound && { l: "Sound Level", v: d.sound }, d.comfort && { l: "Comfort Level", v: d.comfort }, d.energy && { l: "Energy Bills", v: d.energy }].filter(Boolean);
      return (
        <div className={`resc ${tier.hl ? "hl" : ""}`}>
          <div className="tl">{tier.label}</div>
          {d.imageUrl ? <img className="eq-img" src={d.imageUrl} alt={d.name} /> : <div className="eq-icon">{"\u{1F3E0}"}</div>}
          <div className="en">{d.name}</div>
          {d.stage && <div className="es">{d.stage}</div>}
          {CONFIG.showMonthlyPrice && <><div className="pl">Monthly Price:</div><div className="pv">as low as ${d.monthlyPrice.toFixed(2)}<span>/mo</span>{" "}<Ii tooltip={`${CONFIG.financingTermMonths} months at ${CONFIG.financingAPR}% APR`} /></div></>}
          {CONFIG.showCashPrice && <div className="cp">Cash Price: ${d.cashPrice.toLocaleString()}</div>}
          <div className="sl">
            {d.seer2 !== "N/A" && <div className="sr"><div className="slbl">SEER2 <Ii tooltip="Seasonal Energy Efficiency Ratio" /></div><div className="sval">{d.seer2}</div></div>}
            {d.hspf2 !== "N/A" && <div className="sr"><div className="slbl">HSPF2 <Ii tooltip="Heating Seasonal Performance Factor" /></div><div className="sval">{d.hspf2}</div></div>}
            {d.afue !== "N/A" && <div className="sr"><div className="slbl">AFUE <Ii tooltip="Annual Fuel Utilization Efficiency" /></div><div className="sval">{d.afue}</div></div>}
          </div>
          {features.length > 0 && <><button className="sat" onClick={() => setExp(!exp)}>{exp ? "See Less" : "See All"}</button>
            {exp && <div className="sl" style={{ marginTop: 0 }}>{features.map((f, i) => <div key={i} className="fr"><div className="flbl">{f.l}</div><div className="fval">{f.v}</div></div>)}</div>}</>}
          <button className="sbtn" onClick={onSchedule}>Schedule a Home Visit</button>
          <div className="cnote">*We can talk about customizing your system during your home visit</div>
        </div>
      );
    }

    // ============================================================
    // LIVE CALENDAR
    // ============================================================
    function S10({ data, onChange, onNext, bk }) {
      const [avail, setAvail] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [cm, setCm] = useState(new Date().getMonth());
      const [cy, setCy] = useState(new Date().getFullYear());

      useEffect(() => {
        if (!bk?.sessionId) return;
        let off = false; setLoading(true); setError(null);
        bookingGet("/availability", { sessionId: bk.sessionId, tag: "sales tech", days: "14" })
          .then((r) => { if (off) return; setAvail(r); setLoading(false); if (r.availableDays?.length > 0) { const f = new Date(r.availableDays[0].date + "T12:00:00"); setCm(f.getMonth()); setCy(f.getFullYear()); } })
          .catch((e) => { if (off) return; setLoading(false); setError(e.message || "Failed to load availability"); });
        return () => { off = true; };
      }, [bk?.sessionId]);

      if (loading) return (<div className="sc" key="cl"><Av /><h1 className="st">Finding available times...</h1><div style={{ padding: 40 }}><div className="spn" /></div><Ht text="We're checking our real-time schedule to find the best available times for your home visit." /></div>);
      if (error) return (<div className="sc" key="ce"><Av /><h1 className="st">Oops, something went wrong</h1><div className="eb">{error}</div><p style={{ fontSize: 15, color: "#666", marginBottom: 16 }}>Please call us at {CONFIG.companyPhone} to schedule your visit.</p><button className="bp" onClick={() => { setLoading(true); setError(null); bookingGet("/availability", { sessionId: bk.sessionId, tag: "sales tech", days: "14" }).then(r => { setAvail(r); setLoading(false); }).catch(e => { setError(e.message); setLoading(false); }); }}>Try Again</button></div>);

      const ad = avail?.availableDays || [];
      const adSet = new Set(ad.map((d) => d.date));
      const today = new Date();
      const todayStr = today.toISOString().split("T")[0];
      const dim = new Date(cy, cm + 1, 0).getDate();
      const fdow = new Date(cy, cm, 1).getDay();
      const mName = new Date(cy, cm, 1).toLocaleString("en-US", { month: "long", year: "numeric" });
      const cells = [];
      for (let i = 0; i < fdow; i++) cells.push(null);
      for (let d = 1; d <= dim; d++) cells.push(d);
      const canP = cm > today.getMonth() || cy > today.getFullYear();
      const mx = new Date(); mx.setDate(mx.getDate() + 21);
      const canN = new Date(cy, cm + 1, 1) <= mx;
      const selDay = ad.find((d) => d.date === data.selectedDate);
      const uSlots = [];
      if (selDay?.slots) { const seen = new Set(); for (const s of selDay.slots) { if (!seen.has(s.start)) { seen.add(s.start); uSlots.push(s); } } uSlots.sort((a, b) => new Date(a.start) - new Date(b.start)); }
      const fmtSlot = (s) => { try { const st = new Date(s.start); const en = new Date(s.end); const f = (d) => d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true, timeZone: "America/Denver" }); return `${f(st)} - ${f(en)}`; } catch { return s.formatted || "Time slot"; } };

      return (<div className="sc" key="ca"><Av /><h1 className="st">Pick a day and time that works for you.</h1>
        <div className="cc">
          <div className="ch"><button className="cn" disabled={!canP} onClick={() => { let m = cm - 1, y = cy; if (m < 0) { m = 11; y--; } setCm(m); setCy(y); }}>{"\u2039"}</button><div className="ct">{mName}</div><button className="cn" disabled={!canN} onClick={() => { let m = cm + 1, y = cy; if (m > 11) { m = 0; y++; } setCm(m); setCy(y); }}>{"\u203A"}</button></div>
          <div className="cg">
            {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((d) => <div key={d} className="cdw">{d}</div>)}
            {cells.map((d, i) => {
              if (d === null) return <div key={`e${i}`} className="cd emp" />;
              const ds = `${cy}-${String(cm + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
              const ip = ds < todayStr; const ia = adSet.has(ds); const is = data.selectedDate === ds;
              let c = "cd"; if (ip) c += " pst"; else if (is) c += " seld"; else if (ia) c += " avl";
              return <button key={ds} className={c} disabled={!ia} onClick={() => ia && onChange({ ...data, selectedDate: ds, selectedSlot: null })}>{d}</button>;
            })}
          </div>
          {data.selectedDate && uSlots.length > 0 && <div className="sls"><div className="slt">Available times for {selDay?.displayDate || data.selectedDate}</div><div className="slg">{uSlots.map((s, i) => <button key={i} className={`slb ${data.selectedSlot?.start === s.start ? "seld" : ""}`} onClick={() => onChange({ ...data, selectedSlot: s })}>{fmtSlot(s)}</button>)}</div></div>}
          {data.selectedDate && uSlots.length === 0 && <div className="sls"><div className="slt" style={{ color: "#999" }}>No time slots available for this date.</div></div>}
        </div>
        <button className="bp" disabled={!data.selectedSlot} onClick={onNext}>Next</button></div>);
    }

    // ============================================================
    // CONFIRM BOOKING
    // ============================================================
    function S11({ data, selectedTier, bk, onConfirmed, onError }) {
      const [busy, setBusy] = useState(false);
      const cat = EQUIPMENT_CATALOG[data.systemType || "furnace_ac"]?.[data.homeSize || "large"] || EQUIPMENT_CATALOG.furnace_ac.large;
      const eq = cat[selectedTier] || cat.good;
      const sysLabel = {}; SYSTEM_TYPES.forEach(s => sysLabel[s.id] = s.label);
      const slotLbl = (() => { if (!data.selectedSlot) return "Not selected"; try { const st = new Date(data.selectedSlot.start); return st.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", timeZone: "America/Denver" }) + " at " + st.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true, timeZone: "America/Denver" }); } catch { return data.selectedSlot.formatted || "Selected"; } })();

      const confirm = async () => {
        setBusy(true);
        try {
          await bookingPost("/update-session", { sessionId: bk.sessionId, updates: {
            serviceType: "estimate", customerType: bk.customerFound ? "existing" : "new", systemAge: "10+",
            name: data.fullName, phone: (data.phone || "").replace(/\D/g, ""), email: data.email,
            address: data.address ? { street: data.address.split(",")[0]?.trim() || data.address, city: data.address.split(",")[1]?.trim() || "", state: data.address.split(",")[2]?.trim()?.split(" ")[0] || "CO", zip: data.address.split(",")[2]?.trim()?.split(" ")[1] || "" } : null,
            selectedDate: data.selectedDate, selectedSlot: data.selectedSlot,
            issue: [`[Online Quote] New system estimate`, `Equipment: ${eq.name} (${TIER_LABELS[selectedTier]} tier)`, `Stage: ${eq.stage || "N/A"}`, `Quoted Monthly: $${eq.monthlyPrice.toFixed(2)}/mo (${CONFIG.financingTermMonths}mo @ ${CONFIG.financingAPR}%)`, eq.seer2 !== "N/A" ? `SEER2: ${eq.seer2}` : null, eq.hspf2 !== "N/A" ? `HSPF2: ${eq.hspf2}` : null, eq.afue !== "N/A" ? `AFUE: ${eq.afue}` : null, `Home Size: ${SIZE_LABELS[data.homeSize] || data.homeSize}`, `System Type: ${sysLabel[data.systemType] || data.systemType}`, `Address: ${data.address || "Not provided"}`, `Booked via online quoting wizard`].filter(Boolean).join("\n"),
          }, step: "confirm" });
          const result = await bookingPost("/confirm", { sessionId: bk.sessionId });
          onConfirmed(result);
        } catch (e) { setBusy(false); onError(e.message || "Failed to confirm booking"); }
      };

      return (<div className="sc" key="s11"><Av /><h1 className="st">Confirm Your Home Visit</h1>
        <div className="rc">
          <div className="cfr"><div className="cfl">Equipment</div><div className="cfv">{eq.name}</div></div>
          <div className="cfr"><div className="cfl">Tier</div><div className="cfv">{TIER_LABELS[selectedTier]}</div></div>
          {CONFIG.showMonthlyPrice && <div className="cfr"><div className="cfl">Monthly Price</div><div className="cfv">${eq.monthlyPrice.toFixed(2)}/mo</div></div>}
          <div className="cfr"><div className="cfl">When</div><div className="cfv">{slotLbl}</div></div>
          <div className="cfr"><div className="cfl">Name</div><div className="cfv">{data.fullName}</div></div>
          <div className="cfr"><div className="cfl">Address</div><div className="cfv" style={{ fontSize: 13 }}>{data.address}</div></div>
        </div>
        {busy ? <div style={{ display: "flex", alignItems: "center", gap: 12 }}><div className="spn" /><span style={{ color: "#888" }}>Creating your appointment...</span></div> : <button className="bp" onClick={confirm}>Confirm Home Visit</button>}
        <div style={{ flex: 1 }} /><Ht text="After confirming, a sales tech will visit your home to verify the details and finalize your custom quote." /></div>);
    }

    // ============================================================
    // THANK YOU
    // ============================================================
    function S12({ data, conf, onReset }) {
      return (<div className="sc" key="s12"><Av /><h1 className="st">Thank You!</h1>
        <div className="tys"><div style={{ fontSize: 48, marginBottom: 8 }}>{"\u2705"}</div><p className="tyt">Your home visit has been scheduled.</p>
          {conf?.confirmation && <div className="rc" style={{ maxWidth: 400 }}><div className="cfr"><div className="cfl">Date</div><div className="cfv">{conf.confirmation.date}</div></div><div className="cfr"><div className="cfl">Time</div><div className="cfv">{conf.confirmation.time}</div></div></div>}
          <p className="tyt">An email confirmation has been sent to <span className="tye">{data.email || "your email"}</span></p>
          <p className="tyt" style={{ fontSize: 13, color: "#999" }}>If you have any questions, call us at {CONFIG.companyPhone}</p>
          <button className="gab" onClick={onReset}>Get Another Quote</button></div></div>);
    }

    // ============================================================
    // LEAD CAPTURE — fires when customer sees results
    // ============================================================
    async function sendLeadCapture(formData) {
      try {
        const sysLabel = {}; SYSTEM_TYPES.forEach(s => sysLabel[s.id] = s.label);
        const cat = EQUIPMENT_CATALOG[formData.systemType || "furnace_ac"]?.[formData.homeSize || "large"] || EQUIPMENT_CATALOG.furnace_ac.large;
        await fetch(`${BOOKING_API.replace("/api/booking", "/api/quote-lead")}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            tenantId: CONFIG.tenantId,
            name: formData.fullName,
            phone: formData.phone,
            email: formData.email,
            address: formData.address,
            unit: formData.unit || "",
            systemType: sysLabel[formData.systemType] || formData.systemType,
            homeSize: SIZE_LABELS[formData.homeSize] || formData.homeSize,
            unitLocation: formData.unitLocation,
            goodMonthly: cat.good?.monthlyPrice,
            betterMonthly: cat.better?.monthlyPrice,
            bestMonthly: cat.best?.monthlyPrice,
            goodName: cat.good?.name,
            betterName: cat.better?.name,
            bestName: cat.best?.name,
            timestamp: new Date().toISOString(),
          }),
        });
      } catch (e) {
        // Lead capture is fire-and-forget — don't block the wizard
        console.log("Lead capture error (non-blocking):", e.message);
      }
    }

    // ============================================================
    // MAIN WIZARD
    // ============================================================
    function HVACQuoteWizard() {
      const [step, setStep] = useState(0);
      const [fd, setFd] = useState({});
      const [tier, setTier] = useState(null);
      const [bk, setBk] = useState(null);
      const [conf, setConf] = useState(null);
      const [bkErr, setBkErr] = useState(null);
      const [leadSent, setLeadSent] = useState(false);

      const STEPS = ["lead", "address", "systemType", "homeSize", "unitLocation", "review", "loading", "results", "liveCalendar", "confirmBooking", "thankYou"];
      const goN = () => setStep((s) => Math.min(s + 1, STEPS.length - 1));
      const goB = () => setStep((s) => Math.max(s - 1, 0));
      const reset = () => { setStep(0); setFd({}); setTier(null); setBk(null); setConf(null); setBkErr(null); setLeadSent(false); };

      // Send lead capture when the user reaches the results page
      useEffect(() => {
        if (STEPS[step] === "results" && !leadSent) {
          setLeadSent(true);
          sendLeadCapture(fd);
        }
      }, [step, leadSent, fd]);

      const handleSch = useCallback(async (t) => {
        setTier(t); setBkErr(null);
        try {
          const sess = await bookingPost("/start", { tenantId: CONFIG.tenantId });
          await bookingPost("/update-session", { sessionId: sess.sessionId, updates: { serviceType: "estimate", systemAge: "10+" }, step: "calendar" });
          const phone = (fd.phone || "").replace(/\D/g, "");
          let cf = false;
          if (phone.length === 10) { try { const lu = await bookingPost("/lookup-customer", { sessionId: sess.sessionId, phone }); cf = lu.found || false; } catch {} }
          setBk({ sessionId: sess.sessionId, customerFound: cf });
          setStep(9);
        } catch (e) { setBkErr(e.message || "Failed to start booking"); setStep(9); }
      }, [fd.phone]);

      // Tell parent iframe to resize when step changes
      useEffect(() => {
        const sendHeight = () => {
          if (window.parent !== window) {
            window.parent.postMessage({ type: "rox-quote-resize", height: document.body.scrollHeight }, "*");
          }
        };
        sendHeight();
        const t = setTimeout(sendHeight, 500);
        return () => clearTimeout(t);
      }, [step]);

      const render = () => {
        switch (STEPS[step]) {
          case "lead": return <S1 data={fd} onChange={setFd} onNext={goN} />;
          case "address": return <S2 data={fd} onChange={setFd} onNext={goN} />;
          case "systemType": return <S3 data={fd} onChange={setFd} onNext={goN} />;
          case "homeSize": return <S4 data={fd} onChange={setFd} onNext={goN} />;
          case "unitLocation": return <S5 data={fd} onChange={setFd} onNext={goN} />;
          case "review": return <S7 data={fd} onChange={setFd} onNext={goN} />;
          case "loading": return <S8 onComplete={goN} />;
          case "results": return <S9 data={fd} onSchedule={handleSch} />;
          case "liveCalendar": return <S10 data={fd} onChange={setFd} onNext={goN} bk={bk} />;
          case "confirmBooking": return <S11 data={fd} selectedTier={tier} bk={bk} onConfirmed={(r) => { setConf(r); setStep(11); }} onError={(e) => setBkErr(e)} />;
          case "thankYou": return <S12 data={fd} conf={conf} onReset={reset} />;
          default: return null;
        }
      };

      const showBk = step > 0 && !["lead", "loading", "thankYou"].includes(STEPS[step]);

      return (<><style>{wzStyles}</style>
        <div className="wz">
          <div className="hdr">
            {CONFIG.logoUrl ? <img className="hdr-logo" src={CONFIG.logoUrl} alt={CONFIG.companyName} /> : <div style={{ fontWeight: 700, fontSize: 18 }}>{CONFIG.companyName}</div>}
            <div className="hdr-acts"><button className="hdr-btn" onClick={reset} title="Start Over">{"\u21BA"}</button><button className="hdr-btn" title="Help">?</button><button className="hdr-btn" title="Close">{"\u2715"}</button></div>
          </div>
          {showBk && <Bk onClick={goB} />}
          {bkErr && STEPS[step] !== "liveCalendar" && <div className="eb" style={{ margin: "0 24px 12px" }}>{bkErr}</div>}
          {render()}
          <div className="wf"><div className="ft">Breathe Easy! After you finish this journey, select your system, and complete the checkout process, a member of our team will contact you to schedule a visit to your home to confirm the job details. If any adjustments are needed due to special circumstances in your home, we will let you know up front and work out the details before we proceed with the job.</div></div>
        </div></>);
    }

    // ============================================================
    // MOUNT
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById("rox-quote-wizard"));
    root.render(<HVACQuoteWizard />);
  </script>
</body>
</html>
